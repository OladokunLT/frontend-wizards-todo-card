<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frontend Wizards — Todo Card (Stage 0)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap");
      :root {
        font-family: "Inter", system_ui, sans-serif;
      }
    </style>
  </head>
  <body class="bg-zinc-950 min-h-screen flex items-center justify-center p-4">
    <article
      data-testid="test-todo-card"
      class="todo-card w-full max-w-md bg-white/10 backdrop-blur-2xl border border-white/20 rounded-3xl shadow-2xl p-8 text-white"
    >
      <!-- Priority + Status Row -->
      <div class="flex items-center justify-between mb-6">
        <!-- Priority Badge -->
        <div
          data-testid="test-todo-priority"
          class="px-5 py-2 rounded-3xl text-sm font-semibold flex items-center gap-2 bg-red-500/90 text-white"
        >
          🔥 High
        </div>

        <!-- Status -->
        <div
          data-testid="test-todo-status"
          class="px-5 py-2 rounded-3xl text-sm font-medium flex items-center gap-2 bg-amber-500/20 text-amber-300 border border-amber-400/30"
        >
          <div class="w-2 h-2 bg-amber-400 rounded-full animate-pulse"></div>
          In Progress
        </div>
      </div>

      <!-- Title -->
      <h2
        data-testid="test-todo-title"
        class="text-3xl font-semibold leading-tight mb-3"
      >
        Build Testable Todo Item Card
      </h2>

      <!-- Description -->
      <p
        data-testid="test-todo-description"
        class="text-zinc-300 text-[15px] leading-relaxed mb-8"
      >
        Create a clean, modern, fully accessible Todo card with all required
        data-testid attributes, perfect responsiveness, keyboard navigation, and
        live time-remaining updates.
      </p>
    </article>
  </body>
</html>
