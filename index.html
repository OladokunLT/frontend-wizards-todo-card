<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frontend Wizards — Todo Card (Stage 0)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap");
      :root {
        font-family: "Inter", system_ui, sans-serif;
      }
    </style>
  </head>
  <body class="bg-zinc-950 min-h-screen flex items-center justify-center p-4">
    <article
      data-testid="test-todo-card"
      class="todo-card w-full max-w-md bg-white/10 backdrop-blur-2xl border border-white/20 rounded-3xl shadow-2xl p-8 text-white"
    >
      <!-- Priority + Status Row -->
      <div class="flex items-center justify-between mb-6">
        <!-- Priority Badge -->
        <div
          data-testid="test-todo-priority"
          class="px-5 py-2 rounded-3xl text-sm font-semibold flex items-center gap-2 bg-red-500/90 text-white"
        >
          🔥 High
        </div>

        <!-- Status -->
        <div
          data-testid="test-todo-status"
          id="status-badge"
          class="px-5 py-2 rounded-3xl text-sm font-medium flex items-center gap-2 bg-amber-500/20 text-amber-300 border border-amber-400/30"
        >
          <div class="w-2 h-2 bg-amber-400 rounded-full animate-pulse"></div>
          In Progress
        </div>
      </div>

      <!-- Title -->
      <h2
        data-testid="test-todo-title"
        id="todo-title"
        class="text-3xl font-semibold leading-tight mb-3"
      >
        Build Testable Todo Item Card
      </h2>

      <!-- Description -->
      <p
        data-testid="test-todo-description"
        class="text-zinc-300 text-[15px] leading-relaxed mb-8"
      >
        Create a clean, modern, fully accessible Todo card with all required
        data-testid attributes, perfect responsiveness, keyboard navigation, and
        live time-remaining updates.
      </p>

      <!-- Due Date & Time Remaining -->
      <div class="flex flex-wrap items-baseline gap-x-6 mb-8 text-sm">
        <div class="flex items-center gap-x-2">
          <span class="text-zinc-400">📅</span>
          <time
            data-testid="test-todo-due-date"
            datetime="2026-04-25"
            class="font-medium text-zinc-200"
          >
            Due Apr 25, 2026
          </time>
        </div>

        <div class="flex items-center gap-x-2">
          <span class="text-zinc-400">⏳</span>
          <span
            data-testid="test-todo-time-remaining"
            id="time-remaining"
            class="font-medium text-emerald-400"
          >
            Loading...
          </span>
        </div>
      </div>

      <!-- Checkbox -->
      <div class="flex items-center gap-x-3 mb-8">
        <input
          type="checkbox"
          id="complete-toggle"
          data-testid="test-todo-complete-toggle"
          class="w-6 h-6 accent-blue-500 bg-white/10 border-2 border-white/30 rounded-xl cursor-pointer"
        />
        <label
          for="complete-toggle"
          class="font-medium text-zinc-200 cursor-pointer flex-1 select-none"
        >
          Mark as complete
        </label>
      </div>

      <!-- Tags -->
      <div data-testid="test-todo-tags" class="flex flex-wrap gap-2 mb-10">
        <span
          data-testid="test-todo-tag-work"
          class="tag px-4 py-1.5 bg-white/10 text-white text-xs font-medium rounded-3xl border border-white/20 flex items-center"
        >
          💼 work
        </span>
        <span
          data-testid="test-todo-tag-urgent"
          class="tag px-4 py-1.5 bg-white/10 text-white text-xs font-medium rounded-3xl border border-white/20 flex items-center"
        >
          🚨 urgent
        </span>
        <span
          class="tag px-4 py-1.5 bg-white/10 text-white text-xs font-medium rounded-3xl border border-white/20 flex items-center"
        >
          🎨 design
        </span>
        <span
          class="tag px-4 py-1.5 bg-white/10 text-white text-xs font-medium rounded-3xl border border-white/20 flex items-center"
        >
          ⚡ frontend
        </span>
      </div>

      <!-- Action Buttons -->
      <div class="flex items-center justify-end gap-x-3">
        <button
          data-testid="test-todo-edit-button"
          id="edit-btn"
          aria-label="Edit this todo"
          class="flex items-center gap-x-2 px-6 py-3 rounded-2xl bg-white/10 hover:bg-white/20 text-white font-medium text-sm transition-all active:scale-95"
        >
          ✏️ Edit
        </button>

        <button
          data-testid="test-todo-delete-button"
          id="delete-btn"
          aria-label="Delete this todo"
          class="flex items-center gap-x-2 px-6 py-3 rounded-2xl bg-red-500/10 hover:bg-red-500/20 text-red-400 font-medium text-sm transition-all active:scale-95"
        >
          🗑️ Delete
        </button>
      </div>
    </article>

    <script>
      // Fixed due date (April 25, 2026)
      const DUE_DATE = new Date("2026-04-25T18:00:00Z");

      /**
       * Calculate friendly time remaining text
       */
      function getTimeRemaining(due) {
        const now = new Date();
        const diffMs = due - now;

        if (diffMs < 0) {
          // Overdue
          const overdueMs = Math.abs(diffMs);
          const days = Math.floor(overdueMs / (1000 * 60 * 60 * 24));
          const hours = Math.floor(
            (overdueMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60),
          );

          if (days >= 1) return `Overdue by ${days} day${days > 1 ? "s" : ""}`;
          if (hours >= 1)
            return `Overdue by ${hours} hour${hours > 1 ? "s" : ""}`;
          return "Overdue now!";
        }

        // Not overdue
        const days = Math.floor(diffMs / (1000 * 60 * 60 * 24));
        const hours = Math.floor(
          (diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60),
        );

        if (days > 1) return `Due in ${days} days`;
        if (days === 1) return "Due tomorrow";
        if (hours >= 1) return `Due in ${hours} hour${hours > 1 ? "s" : ""}`;
        return "Due now!";
      }

      /**
       * Update time remaining display
       */
      function updateTimeRemaining() {
        const el = document.getElementById("time-remaining");
        if (!el) return;
        el.textContent = getTimeRemaining(DUE_DATE);
      }

      /**
       * Handle checkbox toggle behaviour
       */
      function handleCheckboxToggle() {
        const checkbox = document.getElementById("complete-toggle");
        const title = document.getElementById("todo-title");
        const statusBadge = document.getElementById("status-badge");
        const card = document.querySelector('[data-testid="test-todo-card"]');

        checkbox.addEventListener("change", () => {
          if (checkbox.checked) {
            // Mark as Done
            title.classList.add("line-through", "text-zinc-400");
            card.classList.add("completed");

            statusBadge.innerHTML = `
                    <div class="w-2 h-2 bg-emerald-400 rounded-full"></div>
                    Done
                `;
            statusBadge.className = `px-5 py-2 rounded-3xl text-sm font-medium flex items-center gap-2 bg-emerald-500/20 text-emerald-300 border border-emerald-400/30`;
          } else {
            // Revert to In Progress
            title.classList.remove("line-through", "text-zinc-400");
            card.classList.remove("completed");

            statusBadge.innerHTML = `
                    <div class="w-2 h-2 bg-amber-400 rounded-full animate-pulse"></div>
                    In Progress
                `;
            statusBadge.className = `px-5 py-2 rounded-3xl text-sm font-medium flex items-center gap-2 bg-amber-500/20 text-amber-300 border border-amber-400/30`;
          }
        });
      }

      /**
       * Handle Edit & Delete buttons
       */
      function handleActionButtons() {
        // Edit button
        document.getElementById("edit-btn").addEventListener("click", () => {
          console.log(
            '%c✅ Edit button clicked (data-testid="test-todo-edit-button")',
            "color:#22c55e; font-weight:600",
          );
          alert("🪄 Edit mode opened! (This is a demo)");
        });

        // Delete button
        document.getElementById("delete-btn").addEventListener("click", () => {
          console.log(
            '%c🗑️ Delete button clicked (data-testid="test-todo-delete-button")',
            "color:#ef4444; font-weight:600",
          );
          if (confirm("Delete this task?")) {
            const card = document.querySelector(
              '[data-testid="test-todo-card"]',
            );
            card.style.transition = "all 0.4s cubic-bezier(0.4, 0, 1, 1)";
            card.style.transform = "scale(0.95)";
            card.style.opacity = "0";

            setTimeout(() => {
              alert("✅ Task deleted (demo only)");
              location.reload();
            }, 400);
          }
        });
      }

      /**
       * Initialize everything
       */
      function init() {
        // Initial time display
        updateTimeRemaining();

        // Update time every 60 seconds
        setInterval(updateTimeRemaining, 60000);

        // Checkbox behaviour
        handleCheckboxToggle();

        // Action buttons
        handleActionButtons();

        console.log(
          "%c🚀 Todo Card is fully functional! All requirements met.",
          "color:#22c55e; font-size:14px; font-weight:700",
        );
      }

      // Start the app when page loads
      window.onload = init;
    </script>
  </body>
</html>
